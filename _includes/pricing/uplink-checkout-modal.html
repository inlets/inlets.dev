<div
  id="uplink-modal"
  class="relative z-10 hidden"
  aria-labelledby="uplink-modal-title"
  role="dialog"
  aria-modal="true"
>
  <div
    id="uplink-modal-backdrop"
    class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity opacity-100 hidden"
    aria-hidden="true"
  ></div>

  <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
    <div
      class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0"
    >
      <div
        id="uplink-modal-panel"
        class="relative transform overflow-hidden rounded-lg bg-white px-4 pb-4 pt-5 text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-sm sm:p-6 opacity-100 translate-y-4 sm:translate-y-0 sm:scale-95"
      >
        <div class="absolute top-0 right-0 pt-4 pr-4 sm:block">
          <button
            id="uplink-close-modal-button"
            type="button"
            class="rounded-md bg-white text-gray-400 hover:text-gray-500 focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:outline-hidden"
          >
            <span class="sr-only">Close</span>
            <svg
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              aria-hidden="true"
              data-slot="icon"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M6 18 18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>
        <div>
          <h3 class="text-lg font-semibold text-gray-900" id="uplink-modal-title">
            Inlets Uplink
          </h3>
          <div class="mt-2">
            <p class="text-sm text-gray-500">
              Each subscription is for one Uplink installation and includes 10 tunnels, with additional tunnels at 25 USD / mo each.
            </p>
            <p class="mt-2 text-sm font-medium text-gray-700">
              A subscription is required for each installation, including non-production (dev, test and staging) environments.
            </p>
          </div>
        </div>
        <form id="uplink-checkout-form" class="mt-3 space-y-4">
          <div class="flex items-center">
            <label for="uplink-quantity" class="text-sm font-medium text-gray-700"
              >Tunnels</label
            >
            <input
              id="uplink-quantity"
              name="quantity"
              type="number"
              value="10"
              min="10"
              class="mt-1 ml-3 px-1 w-16 block border-gray-300 shadow-sm focus:border-indigo-500 focus:ring focus:ring-indigo-200 focus:ring-opacity-50"
            />
          </div>

          <div class="flex flex-col sm:flex-row">
            <a
              type="button"
              class="inline-flex items-center justify-center w-full rounded-md px-3 py-2 inline-flex text-sm font-semibold bg-white text-gray-900 ring-1 shadow-xs ring-gray-300 ring-inset hover:bg-gray-50"
              href="https://subscribe.openfaas.com/billing"
            >
              Update subscription
            </a>
            <button
              type="submit"
              class="w-full rounded-md mt-3 sm:mt-0 sm:ml-3 px-3 py-2 text-sm font-semibold text-white bg-indigo-600 shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600"
            >
              Checkout
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  // Function to show the Uplink modal
  function showUplinkModal() {
    const modal = document.getElementById("uplink-modal");
    const backdrop = document.getElementById("uplink-modal-backdrop");

    // Add classes for showing the modal
    modal.classList.remove("hidden");
    backdrop.classList.remove("hidden");
  }

  function hideUplinkModal() {
    const modal = document.getElementById("uplink-modal");
    const backdrop = document.getElementById("uplink-modal-backdrop");

    // Add classes for hiding the modal
    modal.classList.add("hidden");
    backdrop.classList.add("hidden");
  }

  function handleUplinkSubmit(event) {
    event.preventDefault();

    const form = event.target;
    const formData = new FormData(form);

    const quantity = formData.get("quantity");
    const checkoutURL = `https://subscribe.openfaas.com/checkout/buy/89ca2ba2-a7f3-4563-a872-01836f9c5a0d?quantity=${quantity}`;

    window.location.href = checkoutURL;
  }

  // Attach event listeners
  const uplinkCheckoutButtons = document.querySelectorAll(".uplink-checkout-button");

  uplinkCheckoutButtons.forEach((button) => {
    button.addEventListener("click", showUplinkModal);
  });

  document
    .getElementById("uplink-close-modal-button")
    .addEventListener("click", hideUplinkModal);

  document
    .getElementById("uplink-checkout-form")
    .addEventListener("submit", handleUplinkSubmit);
</script>
